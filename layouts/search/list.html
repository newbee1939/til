{{ define "main" }}
<h1>検索</h1>
<div class="search-box">
  <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
  <input type="search" id="q" placeholder="キーワードで検索..." autofocus>
</div>
<p id="status" class="sub"></p>
<div id="results"></div>
<script>
(function() {
  let entries = [];
  fetch({{ "index.json" | relURL }})
    .then(r => r.json())
    .then(data => { entries = data; });

  const input = document.getElementById("q");
  const results = document.getElementById("results");
  const status = document.getElementById("status");

  input.addEventListener("input", function() {
    const q = this.value.trim().toLowerCase();
    if (q.length < 2) { results.innerHTML = ""; status.textContent = ""; return; }

    const hits = entries.filter(e =>
      e.title.toLowerCase().includes(q) || e.content.toLowerCase().includes(q)
    );

    status.textContent = hits.length + " 件見つかりました";
    results.innerHTML = hits.length
      ? hits.map(e => '<div class="card"><a href="' + e.url + '">' + e.title + '</a></div>').join("")
      : "";
    if (!hits.length) status.textContent = "見つかりませんでした";
  });
})();
</script>
{{ end }}
